<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
        }

        .logout {
            color: green;
        }
    </style>
</head>
<body>

<div class="login-box">

    <h2>Login</h2>

    <!-- Error message -->
    <p class="error" th:if="${param.error}">
        Invalid username or password
    </p>

    <!-- Logout message -->
    <p class="logout" th:if="${param.logout}">
        You have been logged out
    </p>

    <form th:action="@{/login}" method="post">

        <input type="text" name="username" placeholder="Username" required />

        <input type="password" name="password" placeholder="Password" required />

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
